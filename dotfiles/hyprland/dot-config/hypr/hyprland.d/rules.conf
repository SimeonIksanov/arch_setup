##############################
### WINDOWS AND WORKSPACES ###
##############################

# sway-notifications block start
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.1, match:namespace swaync-control-center
layerrule = ignore_alpha 0.1, match:namespace swaync-notification-window
# sway-notifications block end

# Waybar block start
layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0.5

layerrule = match:namespace waybar, no_anim on
# Waybar block end

# Rofi block start
layerrule = match:namespace rofi, animation popin 95%
layerrule = match:namespace rofi, blur on
layerrule = match:namespace rofi, ignore_alpha 0.5
# Rofi block end


# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]
windowrule = float on, center on, match:title ^(Save|Open|Export|Import|Choose|Rename|Select).+(File|Folder|As)?
# windowrule = size (monitor_w*0.2) (monitor_h*0.2), match:class (^kitty$)
# windowrule = max_size 400 400, match:float true # has a bug https://github.com/hyprwm/Hyprland/discussions/12762

source = ~/.config/hypr/hyprland.d/rules.d/networkmanager.conf
