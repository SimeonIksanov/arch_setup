###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
# $menu = hyprlauncher
$menu = rofi -show drun
$browser = vivaldi #brave


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# bind = $mainMod, M, exit,
bind = $mainMod,       T,       exec, uwsm app -- $terminal
bind = $mainMod SHIFT, B,       exec, uwsm app -- $browser
bind = $mainMod,       Return,  exec, uwsm app -- $menu
bind = $mainMod,       Q,       killactive
bind = $mainMod SHIFT, Q,       exit
bind = $mainMod,       V,       togglefloating
bind = $mainMod,       P,       pseudo # dwindle
bind = $mainMod SHIFT, j,       layoutmsg, togglesplit # dwindle
bind = $mainMod,       f,       fullscreen
bind = $mainMod,       n,       exec, uwsm app -- swaync-client -t -sw
bind = $mainMod,       Escape,  exec, uwsm app -- wlogout -s

bindd = $mainMod SHIFT, period, Toggle workspace layout, exec, ~/.local/bin/hyprland-workspace-layout-toggle


# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window with mainMod+Ctrl+[ldur]
bind = $mainMod CTRL, h, movewindow,l
bind = $mainMod CTRL, j, movewindow,d
bind = $mainMod CTRL, k, movewindow,u
bind = $mainMod CTRL, l, movewindow,r

# Example special workspace (scratchpad)
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Bing group for window resize
bind = $mainMod, R, submap, resize
submap = resize
  binde = , l, resizeactive,  10   0
  binde = , h, resizeactive, -10   0
  binde = , k, resizeactive,   0 -10
  binde = , j, resizeactive,   0  10

  bind = , escape, submap, reset
submap = reset

# Bind group for window move
bind = $mainMod, M, submap, move
submap = move

  binde= , h, moveactive, -10   0
  binde= , l, moveactive,  10   0
  binde= , k, moveactive,   0 -10
  binde= , j, moveactive,   0  10

  bind=, escape, submap, reset
submap=reset
#

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
# bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
# bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
# bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down
bindel = ,XF86AudioRaiseVolume, exec, uwsm app -- swayosd-client --output-volume +5
bindel = ,XF86AudioLowerVolume, exec, uwsm app -- swayosd-client --output-volume -5
bindel = ALT,XF86AudioRaiseVolume, exec, uwsm app -- swayosd-client --output-volume +1
bindel = ALT,XF86AudioLowerVolume, exec, uwsm app -- swayosd-client --output-volume -1
bindel = ,XF86AudioMute, exec, uwsm app -- swayosd-client --output-volume mute-toggle
# bindel = ,XF86AudioMicMute, exec, uwsm app -- wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ALT,XF86AudioMute, exec, uwsm app -- swayosd-client --input-volume mute-toggle
bindeld = ALT,XF86AudioMute, Mute microphone, exec, uwsm app -- pactl set-source-mute 0 toggle && swayosd-client --device alsa_input.pci-0000_00_1b.0.analog-stereo --input-volume mute-toggle


bindel = ,XF86MonBrightnessUp, exec, uwsm app -- swayosd-client --brightness +5
bindel = ,XF86MonBrightnessDown, exec, uwsm app -- swayosd-client --brightness -5
bindel = ALT,XF86MonBrightnessUp, exec, uwsm app -- swayosd-client --brightness +1
bindel = ALT,XF86MonBrightnessDown, exec, uwsm app -- swayosd-client --brightness -1

bindel = SHIFT,XF86AudioRaiseVolume, exec, uwsm app -- swayosd-client --input-volume raise --device alsa_input.pci-0000_00_1b.0.analog-stereo
bindel = SHIFT,XF86AudioLowerVolume, exec, uwsm app -- swayosd-client --input-volume lower --device alsa_input.pci-0000_00_1b.0.analog-stereo
bindel = SHIFT,XF86AudioMute, exec, uwsm app -- swayosd-client --input-volume mute-toggle --device alsa_input.pci-0000_00_1b.0.analog-stereo


# Laptop keyboard backlight
bindel = ,XF86KbdBrightnessUp, exec, uwsm app -- brightnessctl -d smc::kbd_backlight set +10% 
bindel = ,XF86KbdBrightnessDown, exec, uwsm app -- brightnessctl -d smc::kbd_backlight set +10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, uwsm app -- playerctl next
bindl = , XF86AudioPause, exec, uwsm app -- playerctl play-pause
bindl = , XF86AudioPlay, exec, uwsm app -- playerctl play-pause
bindl = , XF86AudioPrev, exec, uwsm app -- playerctl previous

