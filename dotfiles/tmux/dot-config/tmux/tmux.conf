set-option -g default-terminal "xterm-256color"
set-option -as terminal-features ",*:RGB"
set-option -ag terminal-overrides ',*:cud1=\E[1B'
set-option -g escape-time 0
set-option -g repeat-time 1000
set-option -g aggressive-resize on
set-option -g history-limit 10000
set-option -g pane-border-lines double
set-option -g base-index 1
set-option -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g mouse on
set-window-option -g mode-keys vi

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window      -c "#{pane_current_path}"
bind-key BSpace last-window
bind-key X command-prompt -p "kill window: " "kill-window -t '%%'"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -n M-H previous-window # Use Shift+Alt+H to switch tmux window
bind-key -n M-L next-window     # Use Shift+Alt+L to switch tmux window

# Отключить автоматическое переименование по умолчанию (если мешает)
# set-option -g automatic-rename off

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag, ●, }"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_text " #W"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-left-length 100
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
